<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IoT Facial Recognition — Thesis Presentation</title>
<meta name="description" content="Hệ thống giám sát an ninh và điểm danh thời gian thực bằng nhận diện khuôn mặt">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>tailwind.config={theme:{extend:{colors:{"primary":"#00d2ff","surface-dark":"#020817","accent-cyan":"#00f2fe","accent-blue":"#0061ff","glass-bg":"rgba(15,23,42,0.6)"}}}}</script>
<link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-200 min-h-screen flex overflow-hidden tech-bg">
<div class="absolute inset-0 grid-overlay pointer-events-none"></div>
<div class="orbit w-[800px] h-[800px] -top-40 -left-40"></div>
<div class="orbit w-[1200px] h-[1200px] -top-60 -left-60 opacity-50"></div>
<div class="scan-line"></div>

<!-- Sidebar -->
<aside id="sidebar" class="fixed left-0 top-0 h-full flex flex-col z-40 bg-slate-950/80 backdrop-blur-xl w-60 border-r border-cyan-900/30 transition-transform lg:translate-x-0 -translate-x-full">
<div class="p-6">
  <h1 class="font-['Space_Grotesk'] font-bold text-white text-lg flex items-center gap-2">
    <span class="material-symbols-outlined text-[#00d2ff]">hub</span>IoT Facial
  </h1>
  <p class="font-['Inter'] text-[10px] font-bold text-cyan-500 mt-1 uppercase tracking-[.2em]">Thesis Presentation</p>
</div>
<nav class="flex-1 py-2">
  <p class="text-[10px] font-bold text-slate-600 uppercase tracking-widest mb-2 px-6">Navigation</p>
  <a class="nav-item active py-2.5 px-6 flex items-center gap-3 text-sm cursor-pointer" data-section="intro"><span class="material-symbols-outlined text-base">info</span>Mở Đầu</a>
  <a class="nav-item py-2.5 px-6 flex items-center gap-3 text-sm text-slate-400 cursor-pointer" data-section="arch"><span class="material-symbols-outlined text-base">architecture</span>Kiến Trúc</a>
  <a class="nav-item py-2.5 px-6 flex items-center gap-3 text-sm text-slate-400 cursor-pointer" data-section="hw"><span class="material-symbols-outlined text-base">memory</span>Phần Cứng</a>
  <a class="nav-item py-2.5 px-6 flex items-center gap-3 text-sm text-slate-400 cursor-pointer" data-section="sw"><span class="material-symbols-outlined text-base">code</span>Phần Mềm</a>
  <a class="nav-item py-2.5 px-6 flex items-center gap-3 text-sm text-slate-400 cursor-pointer" data-section="results"><span class="material-symbols-outlined text-base">analytics</span>Kết Quả</a>
  <a class="nav-item py-2.5 px-6 flex items-center gap-3 text-sm text-slate-400 cursor-pointer" data-section="conclusion"><span class="material-symbols-outlined text-base">verified</span>Kết Luận</a>
</nav>
<div class="p-5 border-t border-slate-900">
  <div class="flex items-center gap-3 mb-4">
    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-[#00d2ff] to-[#0061ff] flex items-center justify-center text-slate-950 font-black text-xs">N2</div>
    <div><p class="text-xs font-bold text-white" id="slideCounter">1/20</p><p class="text-[10px] text-slate-500">Nhóm 02</p></div>
  </div>
  <div class="flex gap-2 items-center text-[10px] text-slate-500"><kbd class="bg-slate-800 px-1.5 py-0.5 rounded text-[9px]">←→</kbd> Navigate <kbd class="bg-slate-800 px-1.5 py-0.5 rounded text-[9px] ml-2">F</kbd> Fullscreen</div>
</div>
</aside>

<!-- Mobile toggle -->
<button onclick="toggleSidebar()" class="fixed top-4 left-4 z-50 lg:hidden p-2 bg-slate-900 rounded-lg border border-slate-800">
  <span class="material-symbols-outlined text-[#00d2ff]">menu</span>
</button>

<!-- Main -->
<main class="flex-1 lg:ml-60 min-h-screen flex flex-col relative overflow-y-auto">
<header class="sticky top-0 z-30 bg-slate-950/40 backdrop-blur-md flex justify-between items-center px-8 py-3 border-b border-cyan-500/10">
  <span class="text-lg font-black text-white tracking-tight font-['Space_Grotesk'] glow-text">IoT System <span class="text-[#00d2ff]">Control</span></span>
  <div class="flex items-center gap-3">
    <button onclick="prevSlide()" class="p-1.5 text-slate-400 hover:text-[#00d2ff] transition"><span class="material-symbols-outlined text-xl">arrow_back</span></button>
    <button onclick="nextSlide()" class="p-1.5 text-slate-400 hover:text-[#00d2ff] transition"><span class="material-symbols-outlined text-xl">arrow_forward</span></button>
  </div>
</header>

<div id="slidesContainer" class="p-8 lg:p-12 max-w-7xl mx-auto w-full flex-1 flex flex-col gap-8 relative z-10">
  <!-- Slides injected by JS -->
</div>

<footer class="mt-auto py-4 px-8 flex justify-between items-center text-slate-600 text-[10px] font-['Inter'] border-t border-slate-900 bg-slate-950/40">
  <span>© 2026 Nhóm 02 · GVHD: Đinh Công Đoan</span>
  <span class="font-black text-[#00d2ff] glow-text" id="footerFrame">FRAME 01</span>
</footer>
</main>

<script src="slides-data.js"></script>
<script src="script.js"></script>
</body>
</html>
